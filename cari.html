<!DOCTYPE html>
<html>

<head>

    <title>Cari Mahasiswa</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    {% include 'navbar.html' %}

    <div class="container mt-5">

        <div class="card shadow-lg p-4">

            <h1 class="text-primary mb-4">
                🔍 Cari Mahasiswa
            </h1>

            <input class="form-control mb-4" id="myInput" type="text" placeholder="Cari nama atau NIM">

            <table class="table table-striped table-hover" id="myTable">

                <thead class="table-dark">

                    <tr>
                        <th>NIM</th>
                        <th>Nama</th>
                        <th>IPK</th>
                        <th>Penghasilan</th>
                    </tr>

                </thead>

                <tbody>

                    {% for mhs in data %}

                    <tr>

                        <td>{{ mhs[0] }}</td>
                        <td>{{ mhs[1] }}</td>
                        <td>{{ mhs[3] }}</td>
                        <td>{{ mhs[4] }}</td>

                    </tr>

                    {% endfor %}

                </tbody>

            </table>

            <div class="text-center mt-4">

                <a href="/admin" class="btn btn-secondary px-5">
                    ← Kembali ke Dashboard
                </a>

            </div>

        </div>

    </div>

    <script>

        document.getElementById("myInput")
            .addEventListener("keyup", function () {

                let value = this.value.toLowerCase();

                let rows =
                    document.querySelectorAll("#myTable tbody tr");

                rows.forEach(function (row) {

                    row.style.display =
                        row.innerText.toLowerCase().includes(value)
                            ? ""
                            : "none";

                });

            });

    </script>

    <hr>

    <div class="text-center text-muted mt-4 mb-3">
        © 2026 Scholar Track - Sistem Seleksi Beasiswa
    </div>

</body>

</html>
