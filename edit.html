<!DOCTYPE html>
<html>

<head>
    <title>Edit Mahasiswa</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    {% include 'navbar.html' %}

    <div class="container mt-5">

        <div class="row justify-content-center">

            <div class="col-md-6">

                <div class="card shadow-lg p-4">

                    <h1 class="text-warning text-center mb-4">
                        ✏️ Edit Data Mahasiswa
                    </h1>

                    <form method="POST">

                        <div class="mb-3">
                            <label>Nama</label>
                            <input type="text" name="nama" class="form-control" value="{{mhs[1]}}">
                        </div>

                        <div class="mb-3">
                            <label>IPK</label>
                            <input type="number" step="0.01" name="ipk" class="form-control" value="{{mhs[3]}}">
                        </div>

                        <div class="mb-3">
                            <label>Penghasilan</label>
                            <input type="number" name="penghasilan" class="form-control" value="{{mhs[4]}}">
                        </div>

                        <button class="btn btn-success">
                            Simpan
                        </button>

                    </form>

                </div>
                <a href="/mahasiswa" class="btn btn-secondary">

                    ← Kembali
                </a>

            </div>
        </div>
    </div>
    </div>
    <hr>

    <div class="text-center text-muted mt-4 mb-3">
        © 2026 Scholar Track - Sistem Seleksi Beasiswa
    </div>
</body>

</html>
