<!DOCTYPE html>
<html>

<head>

    <title>Sorting Penghasilan</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    {% include 'navbar.html' %}

    <div class="container mt-5">

        <div class="card shadow-lg">

            <div class="card-body">

                <h1 class="text-warning mb-4">

                    💰 Sorting Berdasarkan Penghasilan

                </h1>

                <table class="table table-striped table-hover">

                    <thead class="table-dark">

                        <tr>

                            <th>No</th>
                            <th>NIM</th>
                            <th>Nama</th>
                            <th>Penghasilan</th>

                        </tr>

                    </thead>

                    <tbody>

                        {% for mhs in data %}

                        <tr>

                            <td>{{ loop.index }}</td>

                            <td>{{ mhs[0] }}</td>

                            <td>{{ mhs[1] }}</td>

                            <td>{{ mhs[4] }}</td>

                        </tr>

                        {% endfor %}

                    </tbody>

                </table>

                <div class="text-center mt-4">

                    <a href="/admin" class="btn btn-secondary px-5">

                        ← Kembali ke Dashboard

                    </a>

                </div>

            </div>

        </div>

    </div>

    <hr>

    <div class="text-center text-muted mt-4 mb-3">

        © 2026 Scholar Track - Sistem Seleksi Beasiswa

    </div>

</body>

</html>
